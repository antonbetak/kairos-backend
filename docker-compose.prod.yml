services:
  api-gateway:
    build: ./api-gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    env_file: .env.prod
    depends_on:
      google_auth:
        condition: service_started
      calendar-service:
        condition: service_started
      googlefit_service:
        condition: service_started

  google_auth:
    restart: always
    env_file: .env.prod
    expose:
      - "8000"

  calendar-service:
    env_file: .env.prod
    restart: unless-stopped
    expose:
      - "8000"

  googlefit_service:
    env_file: .env.prod
    restart: unless-stopped
    expose:
      - "8000"
