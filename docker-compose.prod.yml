services:
  google_auth:
    restart: always
    ports:
      - "${GOOGLE_AUTH_PORT:-8000}:8000"
    env_file: .env.prod

  calendar-service:
    env_file: .env.prod
    ports:
      - "${CALENDAR_PORT:-8001}:8000"
    restart: unless-stopped

  googlefit_service:
    env_file: .env.prod
    ports:
      - "${GOOGLE_FIT_PORT:-8002}:8000"
    restart: unless-stopped
