services:
  postgres:
    image: postgres:16-alpine
    container_name: kairos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kairos-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kairos-rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  stats_postgres:
    image: postgres:16-alpine
    container_name: kairos-stats-postgres
    environment:
      POSTGRES_USER: ${STATS_DB_USER:-kairos_stats_user}
      POSTGRES_PASSWORD: ${STATS_DB_PASSWORD:-kairos_stats_password}
      POSTGRES_DB: ${STATS_DB_NAME:-kairos_stats_db}
    ports:
      - "${STATS_DB_LOCAL_PORT:-5436}:5432"
    volumes:
      - stats_postgres_data:/var/lib/postgresql/data
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STATS_DB_USER:-kairos_stats_user} -d ${STATS_DB_NAME:-kairos_stats_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  google_auth_service:
    build:
      context: ./google_auth
    container_name: kairos-google-auth-service
    ports:
      - "${GOOGLE_AUTH_SERVICE_PORT}:8000"
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  stats_service:
    build:
      context: ./stats_service
    container_name: kairos-stats-service
    environment:
      STATS_DB_USER: ${STATS_DB_USER:-kairos_stats_user}
      STATS_DB_PASSWORD: ${STATS_DB_PASSWORD:-kairos_stats_password}
      STATS_DB_HOST: stats_postgres
      STATS_DB_PORT: ${STATS_DB_PORT:-5432}
      STATS_DB_NAME: ${STATS_DB_NAME:-kairos_stats_db}
    depends_on:
      stats_postgres:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  stats_postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  kairos-network:
    driver: bridge
