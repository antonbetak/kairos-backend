services:
  api-gateway:
    build: ./api-gateway
    env_file: ${ENV_FILE:-.env}
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    restart: on-failure
    depends_on:
      google_auth:
        condition: service_healthy
      calendar-service:
        condition: service_healthy
      googlefit_service:
        condition: service_healthy
      auth_service:
        condition: service_healthy
      schedule_service:
        condition: service_started
      task_service:
        condition: service_started
    networks:
      - kairos-network

  google_auth:
    build: ./google_auth
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-google_auth_service}
      APP_PORT: ${APP_PORT:-8000}
    restart: on-failure
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kairos-network

  calendar-service:
    build: ./calendar_service
    env_file: ${ENV_FILE:-.env}
    restart: on-failure
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kairos-network

  googlefit_service:
    build: ./googlefit_service
    env_file: ${ENV_FILE:-.env}
    restart: on-failure
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kairos-network

  stt_service:
    build: ./stt_service
    env_file: ${ENV_FILE:-.env}
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kairos-network

  auth_postgres:
    image: postgres:16-alpine
    container_name: kairos-auth-postgres
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "${AUTH_DB_LOCAL_PORT}:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  task_postgres:
    image: postgres:16-alpine
    container_name: kairos-task-postgres
    environment:
      POSTGRES_USER: ${TASK_DB_USER}
      POSTGRES_PASSWORD: ${TASK_DB_PASSWORD}
      POSTGRES_DB: ${TASK_DB_NAME}
    ports:
      - "${TASK_DB_LOCAL_PORT}:5432"
    volumes:
      - task_postgres_data:/var/lib/postgresql/data
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TASK_DB_USER} -d ${TASK_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  schedule_postgres:
    image: postgres:16-alpine
    container_name: kairos-schedule-postgres
    environment:
      POSTGRES_USER: ${SCHEDULE_DB_USER}
      POSTGRES_PASSWORD: ${SCHEDULE_DB_PASSWORD}
      POSTGRES_DB: ${SCHEDULE_DB_NAME}
    ports:
      - "${SCHEDULE_DB_LOCAL_PORT}:5432"
    volumes:
      - schedule_postgres_data:/var/lib/postgresql/data
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SCHEDULE_DB_USER} -d ${SCHEDULE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kairos-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kairos-rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ./auth_service
    container_name: kairos-auth-service
    environment:
      AUTH_DB_HOST: auth_postgres
      AUTH_DB_PORT: 5432
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      JWT_REFRESH_EXPIRE_MINUTES: ${JWT_REFRESH_EXPIRE_MINUTES}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
    depends_on:
      auth_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kairos-network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  schedule_service:
    build:
      context: ./schedule_service
    container_name: kairos-schedule-service
    restart: unless-stopped
    environment:
      SCHEDULE_DB_USER: ${SCHEDULE_DB_USER}
      SCHEDULE_DB_PASSWORD: ${SCHEDULE_DB_PASSWORD}
      SCHEDULE_DB_HOST: schedule_postgres
      SCHEDULE_DB_PORT: ${SCHEDULE_DB_PORT}
      SCHEDULE_DB_NAME: ${SCHEDULE_DB_NAME}
    depends_on:
      schedule_postgres:
        condition: service_healthy
    networks:
      - kairos-network
    expose:
      - "8000"

  task_service:
    build:
      context: ./task_service
    container_name: kairos-task-service
    restart: unless-stopped
    environment:
      TASK_DB_USER: ${TASK_DB_USER}
      TASK_DB_PASSWORD: ${TASK_DB_PASSWORD}
      TASK_DB_HOST: task_postgres
      TASK_DB_PORT: ${TASK_DB_PORT}
      TASK_DB_NAME: ${TASK_DB_NAME}
    expose:
      - "8000"
    depends_on:
      task_postgres:
        condition: service_healthy
    networks:
      - kairos-network

  notifications_service:
    build:
      context: ./notifications_service
    container_name: kairos-notifications-service
    restart: on-failure
    env_file: ${ENV_FILE:-.env}
    expose:
      - "8000"
    networks:
      - kairos-network

  stats_service:
    build:
      context: ./stats_service
    container_name: kairos-stats-service
    restart: on-failure
    env_file: ${ENV_FILE:-.env}
    expose:
      - "8000"
    networks:
      - kairos-network

  agent_service:
    build:
      context: ./agent_service
    container_name: kairos-agent-service
    restart: on-failure
    env_file: ${ENV_FILE:-.env}
    expose:
      - "8000"
    networks:
      - kairos-network

volumes:
  auth_postgres_data:
  task_postgres_data:
  schedule_postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  kairos-network:
    driver: bridge
