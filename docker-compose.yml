services:
  postgres:
    image: postgres:16-alpine
    container_name: kairos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kairos-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kairos-rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  google_auth_service:
    build:
      context: ./google_auth
    container_name: kairos-google-auth-service
    ports:
      - "${GOOGLE_AUTH_SERVICE_PORT}:8000"
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  schedule_service:
    build:
      context: ./schedule_service
    container_name: kairos-schedule-service
    restart: unless-stopped
    environment:
      SCHEDULE_DB_USER: ${SCHEDULE_DB_USER}
      SCHEDULE_DB_PASSWORD: ${SCHEDULE_DB_PASSWORD}
      SCHEDULE_DB_HOST: ${SCHEDULE_DB_HOST}
      SCHEDULE_DB_PORT: ${SCHEDULE_DB_PORT}
      SCHEDULE_DB_NAME: ${SCHEDULE_DB_NAME}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kairos-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  kairos-network:
    driver: bridge
